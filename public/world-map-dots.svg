<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none" aria-hidden="true">
  <defs>
    <pattern id="dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#c8cdd4" opacity="0.55"/>
    </pattern>
  </defs>
  <!-- Simplified world map silhouette built from dot clusters -->
  <g opacity="0.7" fill="url(#dots)">
    <ellipse cx="400" cy="200" rx="340" ry="170"/>
    <!-- North America -->
    <ellipse cx="220" cy="160" rx="90" ry="70"/>
    <!-- South America -->
    <ellipse cx="280" cy="280" rx="45" ry="65"/>
    <!-- Europe / Africa -->
    <ellipse cx="420" cy="170" rx="55" ry="50"/>
    <ellipse cx="430" cy="270" rx="60" ry="80"/>
    <!-- Asia -->
    <ellipse cx="560" cy="170" rx="100" ry="70"/>
    <!-- Australia -->
    <ellipse cx="620" cy="300" rx="40" ry="30"/>
  </g>
</svg>
